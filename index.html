<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#080808">
<title>CRM Constructora · Loja</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%23FAC51C'/><text x='16' y='22' text-anchor='middle' font-family='Inter,sans-serif' font-size='18' font-weight='700' fill='%230A0A0A'>P</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#080808;
  --surface-0:#0A0A0A;
  --surface-1:#111;
  --surface-2:#1A1A1A;
  --surface-3:#222;
  --border:#1F1F1F;
  --border-soft:#161616;
  --border-strong:#2A2A2A;
  --text:#F5F5F5;
  --text-muted:#A1A1A1;
  --text-dim:#666;
  --gold:#FAC51C;
  --gold-soft:rgba(250,197,28,.12);
  --gold-line:rgba(250,197,28,.32);
  --success:#6BAA75;
  --danger:#C75D5D;
  --warn:#D9A441;
  --row-h:52px;
  --pad:16px;
  --radius:10px;
  font-family:'Inter',system-ui,sans-serif;
}
*,*::before,*::after{box-sizing:border-box}
html,body{margin:0;padding:0;background:var(--bg);color:var(--text);height:100%;overscroll-behavior:none}
body{font-family:'Inter',system-ui,sans-serif;font-size:14px;line-height:1.45;-webkit-font-smoothing:antialiased}
button{font-family:inherit;font-size:inherit}
input,select,textarea{font-family:inherit;color:inherit;font-size:inherit}
.mono{font-family:'JetBrains Mono',ui-monospace,monospace;font-feature-settings:"tnum"}
::selection{background:var(--gold);color:#000}
::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-thumb{background:#222;border-radius:4px}
::-webkit-scrollbar-track{background:transparent}
a{color:inherit;text-decoration:none}

/* ---- Layout ---- */
#app{display:flex;height:100vh;height:100dvh;overflow:hidden}

/* Sidebar (desktop) */
aside.sidebar{
  width:232px;flex-shrink:0;background:var(--surface-0);
  border-right:1px solid var(--border-soft);
  display:flex;flex-direction:column;padding:20px 14px;
}
.brand{display:flex;align-items:center;gap:10px;padding:4px 8px 24px}
.brand-logo{
  width:28px;height:28px;border-radius:6px;background:var(--gold);
  color:#0A0A0A;display:flex;align-items:center;justify-content:center;
  font-weight:700;font-size:14px;letter-spacing:-.02em
}
.brand-name{font-weight:600;letter-spacing:.04em;font-size:13px}
.brand-sub{font-size:10px;color:#666;letter-spacing:.08em;text-transform:uppercase}
.cta{
  display:flex;align-items:center;justify-content:center;gap:8px;
  background:var(--gold);color:#0A0A0A;border:none;
  padding:10px 12px;border-radius:8px;cursor:pointer;
  font-weight:600;font-size:13px;margin-bottom:18px;width:100%
}
.cta:hover{filter:brightness(.95)}
.nav-label{font-size:10px;color:#555;letter-spacing:.12em;text-transform:uppercase;padding:6px 8px}
nav.main-nav{display:flex;flex-direction:column;gap:2px;flex:1;min-height:0}
.nav-item{
  display:flex;align-items:center;gap:11px;
  background:transparent;color:var(--text-muted);
  border:none;border-radius:8px;padding:9px 10px;cursor:pointer;
  text-align:left;font-size:13px;font-weight:500;position:relative
}
.nav-item:hover{background:#0F0F0F}
.nav-item.active{background:var(--surface-2);color:var(--text)}
.nav-item.active::before{content:"";position:absolute;left:-14px;top:8px;bottom:8px;width:2px;background:var(--gold);border-radius:2px}
.team-item{display:flex;align-items:center;gap:10px;padding:6px 10px;border-radius:8px}
.team-name{font-size:12px;color:#D4D4D4;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.team-role{font-size:10px;color:#666}
.dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.sidebar-footer{border-top:1px solid var(--border-soft);padding-top:14px;display:flex;align-items:center;gap:10px}

main.content{flex:1;min-width:0;overflow:hidden;display:flex;flex-direction:column}
.page{padding:28px 36px;overflow-y:auto;flex:1;height:100%}
.page-header{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;margin-bottom:22px;flex-wrap:wrap}
.page-eyebrow{font-size:11px;color:#666;letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px}
h1.page-title{margin:0;font-size:26px;font-weight:500;letter-spacing:-.015em}
h1 .count{font-family:'JetBrains Mono',ui-monospace,monospace;font-size:14px;color:#666;margin-left:8px;font-weight:400}
.page-sub{font-size:13px;color:var(--text-muted);margin-top:4px}
.page-actions{display:flex;gap:8px;flex-wrap:wrap}

/* Buttons */
.btn{
  display:inline-flex;align-items:center;gap:6px;
  padding:8px 12px;border-radius:8px;font-size:13px;cursor:pointer;
  border:1px solid var(--border);background:var(--surface-1);color:var(--text)
}
.btn:hover{background:var(--surface-2);border-color:var(--border-strong)}
.btn.primary{background:var(--gold);color:#0A0A0A;border-color:var(--gold);font-weight:600}
.btn.primary:hover{filter:brightness(.95);background:var(--gold)}
.btn.ghost{background:transparent;border-color:transparent;color:var(--gold)}
.btn.ghost:hover{background:transparent;color:var(--gold)}
.btn.icon{padding:6px;background:transparent;border:none;color:#555}
.btn.icon:hover{color:var(--text)}
.btn[disabled]{opacity:.5;cursor:not-allowed}

/* Cards */
.card{background:var(--surface-1);border:1px solid var(--border);border-radius:var(--radius);padding:18px}
.card.flush{padding:0}
.card-head{display:flex;align-items:center;justify-content:space-between;padding:16px 18px;border-bottom:1px solid var(--border-soft)}
.card-title{font-size:13px;font-weight:500}
.card-sub{font-size:11px;color:#666;margin-top:2px}

/* KPI */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:22px}
.kpi{display:flex;flex-direction:column;gap:14px;min-height:132px}
.kpi-label{font-size:11px;color:var(--text-muted);letter-spacing:.06em;text-transform:uppercase}
.kpi-value{font-family:'JetBrains Mono',ui-monospace,monospace;font-size:30px;font-weight:500;color:var(--text);letter-spacing:-.02em;line-height:1}
.kpi-value.gold{color:var(--gold)}
.kpi-foot{display:flex;align-items:flex-end;justify-content:space-between;margin-top:auto;font-size:11px;color:#666}
.kpi-row{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap}
.delta{display:inline-flex;align-items:center;gap:3px;font-size:11px;font-weight:500}
.delta.up{color:var(--success)}
.delta.down{color:var(--danger)}

/* Body grid Dashboard */
.dash-grid{display:grid;grid-template-columns:1.6fr 1fr;gap:14px}
.span-all{grid-column:1 / -1}

/* Table */
table{width:100%;border-collapse:collapse;font-size:13px}
thead{background:#0E0E0E;border-bottom:1px solid var(--surface-2)}
th{
  text-align:left;padding:10px 16px;font-weight:500;color:#666;
  font-size:11px;letter-spacing:.04em;text-transform:uppercase;white-space:nowrap;cursor:pointer;user-select:none
}
th.right{text-align:right}
th.sorted{color:var(--text)}
tbody tr{border-bottom:1px solid #141414;cursor:pointer;height:var(--row-h)}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:#0E0E0E}
td{padding:8px 16px;color:#D4D4D4}
td.right{text-align:right}
td.dim{color:var(--text-muted)}
td.muted{color:#666}
td.strong{color:var(--text)}

/* Avatar */
.avatar{
  display:inline-flex;align-items:center;justify-content:center;
  background:var(--surface-2);color:var(--text);
  border-radius:50%;font-weight:500;font-size:11px;flex-shrink:0;
  border:1px solid var(--border-strong)
}
.avatar.ringed{box-shadow:0 0 0 2px var(--gold-line)}

/* Pills */
.pill{display:inline-flex;align-items:center;gap:6px;font-size:11px;padding:2px 8px;border-radius:4px;border:1px solid var(--border);color:var(--text-muted)}
.pill.gold{border-color:var(--gold-line);background:var(--gold-soft);color:var(--gold)}
.pill.ok{border-color:rgba(107,170,117,.32);background:rgba(107,170,117,.08);color:var(--success)}
.pill.warn{border-color:rgba(217,164,65,.32);background:rgba(217,164,65,.08);color:var(--warn)}
.pill.bad{border-color:rgba(199,93,93,.32);background:rgba(199,93,93,.08);color:var(--danger)}
.pill.kind-propio{border-color:var(--gold-line);background:var(--gold-soft);color:var(--gold)}
.pill.kind-cliente{border-color:var(--border-strong);color:#D4D4D4}

/* Status pill mapping */
.status-lead{border-color:rgba(217,164,65,.32);background:rgba(217,164,65,.08);color:var(--warn)}
.status-prospect{border-color:rgba(107,170,117,.32);background:rgba(107,170,117,.08);color:var(--success)}
.status-customer{border-color:var(--gold-line);background:var(--gold-soft);color:var(--gold)}

/* Filters bar */
.filters{display:flex;align-items:center;gap:14px;margin-bottom:14px;flex-wrap:wrap}
.search{
  display:flex;align-items:center;gap:8px;flex:1;min-width:240px;
  background:var(--surface-1);border:1px solid var(--border);border-radius:8px;padding:8px 12px
}
.search input{flex:1;background:transparent;border:none;outline:none;color:var(--text);font-size:13px}
.tabs{display:flex;background:var(--surface-1);border:1px solid var(--border);border-radius:8px;padding:3px;flex-wrap:wrap}
.tabs button{
  background:transparent;color:var(--text-muted);border:none;border-radius:6px;
  padding:6px 12px;font-size:12px;cursor:pointer;display:inline-flex;align-items:center;gap:6px
}
.tabs button.active{background:var(--surface-2);color:var(--text)}
.tabs .count{font-family:'JetBrains Mono',ui-monospace,monospace;font-size:10px;color:#666}

/* Pipeline */
.kanban{display:grid;grid-template-columns:repeat(6,minmax(240px,1fr));gap:12px;flex:1;overflow-x:auto;overflow-y:hidden;padding-bottom:28px;min-height:0}
.kanban .col{
  background:#0B0B0B;border:1px solid var(--border-soft);border-radius:10px;padding:12px;
  display:flex;flex-direction:column;min-height:0;transition:border-color 120ms,background 120ms
}
.kanban .col.over{background:#0F0F0E;border-color:var(--gold-line)}
.col-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.col-head .label{font-size:12px;color:var(--text);font-weight:500}
.col-head .count{font-family:'JetBrains Mono',ui-monospace,monospace;font-size:11px;color:#666}
.col-sub{font-family:'JetBrains Mono',ui-monospace,monospace;font-size:11px;color:#666;margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid var(--border-soft)}
.col-sub.gold{color:var(--gold)}
.col-list{flex:1;overflow-y:auto;min-height:0}
.kard{
  background:var(--surface-2);border:1px solid var(--border);border-radius:8px;
  padding:12px;margin-bottom:8px;cursor:grab;transition:border-color 120ms,opacity 120ms
}
.kard:hover{border-color:var(--border-strong)}
.kard.dragging{opacity:.4}
.kard-title{font-size:13px;color:var(--text);font-weight:500;line-height:1.3;margin-bottom:8px;display:flex;justify-content:space-between;gap:8px}
.kard-svc{font-size:11px;color:var(--text-muted);margin-bottom:10px}
.kard-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.kard-foot{display:flex;align-items:center;justify-content:space-between;padding-top:10px;border-top:1px solid var(--border)}
.kard .value{font-family:'JetBrains Mono',ui-monospace,monospace;font-size:14px;color:var(--gold);font-weight:500}
.kard .m2{font-family:'JetBrains Mono',ui-monospace,monospace;font-size:11px;color:#666}
.empty-drop{border:1px dashed var(--border);border-radius:8px;padding:20px 12px;text-align:center;font-size:11px;color:#444}

/* Detail */
.detail-back{display:inline-flex;align-items:center;gap:6px;color:var(--text-muted);background:transparent;border:none;cursor:pointer;font-size:13px;padding:0;margin-bottom:18px}
.detail-back:hover{color:var(--text)}
.detail-grid{display:grid;grid-template-columns:340px 1fr;gap:14px}
.detail-info dl{margin:0;display:grid;grid-template-columns:auto 1fr;gap:6px 14px;font-size:12px}
.detail-info dt{color:#666;text-transform:uppercase;letter-spacing:.06em;font-size:10px;align-self:center}
.detail-info dd{margin:0;color:var(--text)}
.timeline{display:flex;flex-direction:column;gap:0}
.tl-item{display:flex;gap:14px;padding:14px 0;border-bottom:1px solid var(--border-soft)}
.tl-item:last-child{border-bottom:none}
.tl-icon{
  width:32px;height:32px;border-radius:8px;background:var(--surface-2);
  border:1px solid var(--border);display:flex;align-items:center;justify-content:center;color:var(--text-muted);flex-shrink:0
}
.tl-body{flex:1;min-width:0}
.tl-title{font-size:13px;color:var(--text);margin-bottom:2px}
.tl-meta{font-size:11px;color:#666;margin-bottom:6px;display:flex;gap:8px;flex-wrap:wrap}
.tl-text{font-size:12px;color:var(--text-muted);line-height:1.5}

/* Modal */
.modal-backdrop{
  position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);
  display:none;align-items:flex-end;justify-content:center;z-index:100;padding:0
}
.modal-backdrop.open{display:flex}
.modal{
  background:var(--surface-1);border:1px solid var(--border);border-radius:14px 14px 0 0;
  width:100%;max-width:560px;max-height:88vh;display:flex;flex-direction:column;overflow:hidden
}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border-soft)}
.modal-head h3{margin:0;font-size:15px;font-weight:500}
.modal-body{padding:20px;overflow-y:auto;flex:1}
.modal-foot{display:flex;justify-content:flex-end;gap:8px;padding:14px 20px;border-top:1px solid var(--border-soft)}
.field{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
.field label{font-size:11px;color:#A1A1A1;letter-spacing:.04em;text-transform:uppercase}
.field input,.field select,.field textarea{
  background:var(--surface-2);border:1px solid var(--border);border-radius:8px;
  padding:10px 12px;color:var(--text);font-size:13px;outline:none
}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--gold-line)}
.field textarea{resize:vertical;min-height:64px}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}

/* Toast */
.toast{
  position:fixed;bottom:18px;right:18px;background:var(--surface-2);
  border:1px solid var(--border-strong);border-radius:8px;padding:10px 14px;
  font-size:12px;color:var(--text);z-index:200;display:none;box-shadow:0 8px 24px rgba(0,0,0,.4)
}
.toast.show{display:block}
.toast.bad{border-color:rgba(199,93,93,.4);color:var(--danger)}

/* Chart */
.chart{width:100%;height:220px}

/* Mobile bottom nav */
.bottom-nav{display:none}

/* Responsive ----------------------------------------------------- */
@media (max-width: 1100px){
  .kpi-grid{grid-template-columns:repeat(2,1fr)}
  .dash-grid{grid-template-columns:1fr}
  .detail-grid{grid-template-columns:1fr}
}

@media (max-width: 720px){
  aside.sidebar{display:none}
  .page{padding:18px 16px 90px}
  .page-header{flex-direction:column;align-items:flex-start}
  h1.page-title{font-size:22px}
  .kpi-grid{grid-template-columns:1fr 1fr;gap:10px}
  .kpi-value{font-size:24px}
  .kanban{grid-template-columns:repeat(6,minmax(80vw,1fr));scroll-snap-type:x mandatory}
  .kanban .col{scroll-snap-align:start}
  .filters{gap:10px}
  .filters > .btn{display:none}
  table thead{display:none}
  table tbody tr{display:flex;flex-direction:column;padding:10px 0;height:auto}
  table tbody tr td{padding:2px 12px;border:none}
  table tbody tr td:first-child{display:none}
  table tbody tr td.last-col{display:none}
  table tbody tr td[data-label]::before{content:attr(data-label) " ";color:#555;font-size:10px;text-transform:uppercase;letter-spacing:.06em;display:inline-block;min-width:80px}
  .field-row{grid-template-columns:1fr}
  .modal{border-radius:14px 14px 0 0;max-width:none}
  .bottom-nav{
    display:flex;position:fixed;bottom:0;left:0;right:0;
    background:var(--surface-0);border-top:1px solid var(--border-soft);
    padding:6px 4px calc(6px + env(safe-area-inset-bottom));z-index:50
  }
  .bottom-nav button{
    flex:1;background:transparent;border:none;color:var(--text-muted);
    display:flex;flex-direction:column;align-items:center;gap:2px;
    padding:6px 4px;font-size:10px;cursor:pointer;border-radius:8px
  }
  .bottom-nav button.active{color:var(--gold)}
  .bottom-nav button svg{width:20px;height:20px}
  .modal-backdrop{padding:0}
}

/* Spinner */
.spinner{
  width:14px;height:14px;border:2px solid var(--border-strong);
  border-top-color:var(--gold);border-radius:50%;
  animation:spin .8s linear infinite;display:inline-block;vertical-align:middle
}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-screen{
  position:fixed;inset:0;display:flex;align-items:center;justify-content:center;gap:10px;
  background:var(--bg);color:var(--text-muted);font-size:13px;z-index:1000
}
.error-box{
  background:#2a1215;border:1px solid #5c2b2e;border-radius:10px;
  padding:14px 18px;color:#ff8a80;font-size:12px;margin:24px;font-family:'JetBrains Mono',monospace;white-space:pre-wrap
}
</style>
</head>
<body>

<div id="loader" class="loading-screen"><span class="spinner"></span> Cargando datos…</div>

<div id="app" style="display:none">
  <!-- Sidebar desktop -->
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-logo">P</div>
      <div>
        <div class="brand-name">PEDRA</div>
        <div class="brand-sub">CRM · Loja</div>
      </div>
    </div>

    <button class="cta" data-action="new-project">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
      Nuevo proyecto
    </button>

    <div class="nav-label">Workspace</div>
    <nav class="main-nav">
      <button class="nav-item" data-route="dashboard">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><rect x="3" y="3" width="7" height="9" rx="1.5"/><rect x="14" y="3" width="7" height="5" rx="1.5"/><rect x="14" y="12" width="7" height="9" rx="1.5"/><rect x="3" y="16" width="7" height="5" rx="1.5"/></svg>
        <span style="flex:1">Dashboard</span>
      </button>
      <button class="nav-item" data-route="clients">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="12" cy="8" r="3.5"/><path d="M5 20c0-3.5 3-6 7-6s7 2.5 7 6"/></svg>
        <span style="flex:1">Clientes</span>
      </button>
      <button class="nav-item" data-route="pipeline">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><rect x="3" y="4" width="5" height="16" rx="1"/><rect x="9.5" y="4" width="5" height="11" rx="1"/><rect x="16" y="4" width="5" height="7" rx="1"/></svg>
        <span style="flex:1">Pipeline</span>
      </button>
      <button class="nav-item" data-route="properties">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M3 11l9-7 9 7v9a1 1 0 0 1-1 1h-5v-6h-6v6H4a1 1 0 0 1-1-1z"/></svg>
        <span style="flex:1">Terrenos</span>
      </button>
      <button class="nav-item" data-route="expenses">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><rect x="3" y="6" width="18" height="13" rx="2"/><path d="M3 10h18M7 15h3"/></svg>
        <span style="flex:1">Gastos</span>
      </button>

      <div class="nav-label" style="padding-top:18px">Equipo</div>
      <div class="team-item">
        <div class="avatar" style="width:22px;height:22px">PC</div>
        <div style="display:flex;flex-direction:column;min-width:0;flex:1">
          <span class="team-name">Pedro Cárdenas</span>
          <span class="team-role">Gerente</span>
        </div>
        <span class="dot" style="background:var(--success)"></span>
      </div>
      <div class="team-item">
        <div class="avatar" style="width:22px;height:22px">RO</div>
        <div style="display:flex;flex-direction:column;min-width:0;flex:1">
          <span class="team-name">Residente</span>

//// ----------------------- DATA LOAD ---------------------
async function loadAll(){
  if (DEMO_MODE){
    state.clients    = JSON.parse(JSON.stringify(DEMO.clients));
    state.properties = JSON.parse(JSON.stringify(DEMO.properties));
    state.projects   = JSON.parse(JSON.stringify(DEMO.projects));
    state.activities = JSON.parse(JSON.stringify(DEMO.activities));
    state.expenses   = JSON.parse(JSON.stringify(DEMO.expenses));
    return;
  }
  // timeout manual: si Supabase no responde en 6s, asumimos que no está y caemos a demo
  const withTimeout = (p, ms=6000) => Promise.race([
    p,
    new Promise((_, rj) => setTimeout(() => rj(new Error('timeout — Supabase no respondió en ' + ms + 'ms')), ms))
  ]);
  const [c, p, pr, a, ex] = await withTimeout(Promise.all([
    sb.from('clients').select('*').order('last_activity', { ascending:false, nullsFirst:false }),
    sb.from('properties').select('*').order('code'),
    sb.from('projects').select('*').order('created_at', { ascending:false }),
    sb.from('activities').select('*').order('occurred_at', { ascending:false }).limit(200),
    sb.from('expenses').select('*').order('spent_on', { ascending:false })
  ]));
  if (c.error)  throw c.error;
  if (p.error)  throw p.error;
  if (pr.error) throw pr.error;
  if (a.error)  throw a.error;
  // expenses puede no existir si no han ejecutado el SQL nuevo — degradamos
  state.clients    = c.data || [];
  state.properties = p.data || [];
  state.projects   = pr.data || [];
  state.activities = a.data || [];
  state.expenses   = (ex && !ex.error) ? (ex.data || []) : [];
  if (ex && ex.error) console.warn('No pude leer expenses (¿tabla aún no creada?):', ex.error.message);
}

// Helper: total gastado en un proyecto
function projectSpent(projectId){
  return state.expenses.filter(e => e.project_id === projectId)
                       .reduce((s,e)=>s + Number(e.amount_usd||0), 0);
}
function projectSpentByStatus(projectId, status){
  return state.expenses.filter(e => e.project_id === projectId && e.status === status)
                       .reduce((s,e)=>s + Number(e.amount_usd||0), 0);
}
// Total de gastos administrativos en un terreno
function propertySpent(propertyId){
  return state.expenses.filter(e => e.property_id === propertyId)
                       .reduce((s,e)=>s + Number(e.amount_usd||0), 0);
}
// Coste total acumulado de un terreno (precio compra + admin)
function propertyTotalCost(property){
  return Number(property?.price_usd||0) + propertySpent(property?.id);
}

// SVG line chart used for revenue series
function lineChart(data, w=680, h=220){
  if (!data || !data.length) return '';
  const min = Math.min(...data), max = Math.max(...data);
  const range = max - min || 1;
  const padX = 8, padY = 14;
  const stepX = (w - padX*2) / Math.max(1, data.length - 1);
  const pts = data.map((v,i) => [padX + i*stepX, padY + (h - padY*2) * (1 - (v-min)/range)]);
  const d  = pts.map((p,i) => (i?'L':'M') + p[0].toFixed(1) + ',' + p[1].toFixed(1)).join(' ');
  const da = `${d} L${pts[pts.length-1][0].toFixed(1)},${(h-padY).toFixed(1)} L${pts[0][0].toFixed(1)},${(h-padY).toFixed(1)} Z`;
  return `<svg class="chart" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
    <defs>
      <linearGradient id="lg" x1="0" x2="0" y1="0" y2="1">
        <stop offset="0%"   stop-color="#FAC51C" stop-opacity="0.3"/>
        <stop offset="100%" stop-color="#FAC51C" stop-opacity="0"/>
      </linearGradient>
    </defs>
    <path d="${da}" fill="url(#lg)" />
    <path d="${d}"  fill="none" stroke="#FAC51C" stroke-width="1.6" />
    ${pts.map((p,i)=>i===pts.length-1?`<circle cx="${p[0].toFixed(1)}" cy="${p[1].toFixed(1)}" r="3" fill="#FAC51C"/>`:'').join('')}
  </svg>`;
}
function sparkline(data, w=70, h=22){
  if(!data||!data.length) return '';
  const min=Math.min(...data),max=Math.max(...data),r=max-min||1;
  const sx=w/Math.max(1,data.length-1);
  const pts=data.map((v,i)=>[i*sx,h - (h-2)*((v-min)/r) - 1]);
  const d=pts.map((p,i)=>(i?'L':'M')+p[0].toFixed(1)+','+p[1].toFixed(1)).join(' ');
  return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}"><path d="${d}" fill="none" stroke="#FAC51C" stroke-width="1.4"/></svg>`;
}

// Build a 12-point series from project budgets / activities for KPI sparks
function pseudoSeries(seed, n=12){
  // simple deterministic series so cards never look empty
  const out = []; let v = seed*0.6;
  for (let i=0; i<n; i++){ v += seed*0.05*((i%3)-1) + seed*0.04; out.push(Math.max(seed*0.4, v)); }
  return out;
}

function kpi(label, value, delta, deltaPos, sub, series, gold){
  return `
    <div class="card kpi">
      <div style="display:flex;align-items:center;justify-content:space-between">
        <span class="kpi-label">${label}</span>
      </div>
      <div class="kpi-row">
        <span class="kpi-value ${gold?'gold':''}">${value}</span>
        ${delta?`<span class="delta ${deltaPos?'up':'down'}">${deltaPos?'▲':'▼'} ${delta}</span>`:''}
      </div>
      <div class="kpi-foot">
        <span>${sub||''}</span>
        ${series?sparkline(series):''}
      </div>
    </div>`;
}

function activityIcon(type){
  const map = {
    llamada: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M5 4h4l2 5-3 2a11 11 0 0 0 5 5l2-3 5 2v4a2 2 0 0 1-2 2A17 17 0 0 1 3 6a2 2 0 0 1 2-2z"/></svg>',
    reunion: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M16 3v4M8 3v4M3 11h18"/></svg>',
    email:   '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 7l9 6 9-6"/></svg>',
    whatsapp:'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 12a9 9 0 1 1-3.5-7.1L21 4l-1 3.5A9 9 0 0 1 21 12z"/></svg>',
    visita_obra:'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 11l9-7 9 7v9a1 1 0 0 1-1 1h-5v-6h-6v6H4a1 1 0 0 1-1-1z"/></svg>',
    nota:    '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M5 4h11l4 4v12a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V5a1 1 0 0 1 1-1z"/><path d="M14 4v5h5"/></svg>',
    tarea:   '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="4" y="4" width="16" height="16" rx="2"/><path d="M8 12l3 3 5-6"/></svg>'
  };
  return map[type] || map.nota;
}

// ===== Clients =====
function viewClients(){
  const f = state.filters;
  let list = state.clients.slice();
  if (f.status !== 'all') list = list.filter(c => c.status === f.status);
  if (f.query.trim()) {
    const q = f.query.toLowerCase();
    list = list.filter(c =>
      (c.name||'').toLowerCase().includes(q) ||
      (c.company||'').toLowerCase().includes(q) ||
      (c.city||'').toLowerCase().includes(q) ||
      (c.email||'').toLowerCase().includes(q)
    );
  }
  list.sort((a,b)=>{
    let av=a[f.sort.key], bv=b[f.sort.key];
    if (typeof av === 'string') { av=av.toLowerCase(); bv=(bv||'').toLowerCase(); }
    av = av ?? ''; bv = bv ?? '';
    if (av < bv) return f.sort.dir === 'asc' ? -1 : 1;
    if (av > bv) return f.sort.dir === 'asc' ? 1 : -1;
    return 0;
  });

  const counts = {
    all: state.clients.length,
    lead: state.clients.filter(c=>c.status==='lead').length,
    prospect: state.clients.filter(c=>c.status==='prospect').length,
    customer: state.clients.filter(c=>c.status==='customer').length,
  };
  const sortIcon = (k) => f.sort.key===k ? (f.sort.dir==='asc'?'▲':'▼') : '↕';

  return `
    <div class="page">
      <div class="page-header">
        <div>
          <div class="page-eyebrow">Cartera</div>
          <h1 class="page-title">Clientes <span class="count">${list.length}</span></h1>
        </div>
        <div class="page-actions">
          <button class="btn" data-action="new-project">+ Nuevo proyecto</button>
          <button class="btn primary" data-action="new-client">+ Nuevo cliente</button>
        </div>
      </div>

      <div class="filters">
        <div class="search">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="1.6"><circle cx="11" cy="11" r="7"/><path d="M21 21l-5-5"/></svg>
          <input id="searchInput" placeholder="Buscar por nombre, empresa, ciudad…" value="${escapeHtml(f.query)}" />
        </div>
        <div class="tabs">
          ${['all','lead','prospect','customer'].map(s => `
            <button data-filter="${s}" class="${f.status===s?'active':''}">
              ${({all:'Todos',lead:'Leads',prospect:'Prospects',customer:'Customers'})[s]}
              <span class="count">${counts[s]}</span>
            </button>`).join('')}
        </div>
      </div>

      <div class="card flush">
        <table>
          <thead>
            <tr>
              <th data-sort="name" class="${f.sort.key==='name'?'sorted':''}">Contacto ${sortIcon('name')}</th>
              <th data-sort="company">Empresa ${sortIcon('company')}</th>
              <th data-sort="status">Estado ${sortIcon('status')}</th>
              <th data-sort="city">Ciudad ${sortIcon('city')}</th>
              <th data-sort="total_value" class="right">Valor ${sortIcon('total_value')}</th>
              <th data-sort="last_activity" class="right">Última act. ${sortIcon('last_activity')}</th>
            </tr>
          </thead>
          <tbody>
            ${list.length===0?`<tr><td colspan="6" style="padding:40px;text-align:center;color:#666">Sin resultados.</td></tr>`:list.map(c=>`
              <tr data-client-id="${c.id}">
                <td data-label="Contacto">
                  <div style="display:flex;align-items:center;gap:10px">
                    ${avatar(c.name)}
                    <div style="display:flex;flex-direction:column">
                      <span class="strong" style="color:var(--text)">${escapeHtml(c.name)}</span>
                      <span style="font-size:11px;color:#666">${escapeHtml(c.email||'')}</span>
                    </div>
                  </div>
                </td>
                <td class="dim" data-label="Empresa">${escapeHtml(c.company||'—')}</td>
                <td data-label="Estado">${statusPill(c.status)}</td>
                <td class="dim" data-label="Ciudad">📍 ${escapeHtml(c.city||'—')}</td>
                <td class="strong right mono" data-label="Valor">${fmtMoney(c.total_value)}</td>
                <td class="muted right mono" data-label="Última">${fmtDate(c.last_activity)}</td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>
    </div>`;
}

// ===== Pipeline =====
function viewPipeline(){
  const totalValue = state.projects.filter(p=>p.stage!=='entrega').reduce((s,p)=>s+Number(p.budget_usd||0),0);
  return `
    <div class="page" style="display:flex;flex-direction:column;height:100%;overflow:hidden;padding-bottom:0">
      <div class="page-header">
        <div>
          <div class="page-eyebrow">Sales · obras</div>
          <h1 class="page-title">Pipeline <span class="count">${state.projects.length} proyectos · ${fmtMoney(totalValue)}</span></h1>
        </div>
        <div class="page-actions">
          <button class="btn primary" data-action="new-project">+ Nuevo proyecto</button>
        </div>
      </div>
      <div class="kanban" id="kanban">
        ${STAGES.map(stg => {
          const items = state.projects.filter(p => p.stage === stg.id);
          const value = items.reduce((s,p)=>s+Number(p.budget_usd||0),0);
          const isClosed = stg.id === 'entrega';
          return `
            <div class="col" data-stage="${stg.id}">
              <div class="col-head">
                <div style="display:flex;align-items:center;gap:8px">
                  <span class="dot" style="background:${isClosed?'var(--gold)':'#444'}"></span>
                  <span class="label">${stg.label}</span>
                  <span class="count">${items.length}</span>
                </div>
              </div>
              <div class="col-sub ${isClosed?'gold':''}">${fmtMoney(value)}</div>
              <div class="col-list">
                ${items.length===0 ? `<div class="empty-drop">Suelta aquí</div>` :
                  items.map(p => {
                    const c = state.clients.find(x => x.id === p.client_id);
                    const late = (p.days_in_stage||0) > 10 && p.stage !== 'entrega';
                    return `
                      <div class="kard" draggable="true" data-id="${p.id}" data-client-id="${c?.id||''}">
                        <div class="kard-title">
                          <span>${escapeHtml(p.title)}</span>
                          <span style="color:#444">⋮⋮</span>
                        </div>
                        <div class="kard-svc">${escapeHtml(p.service||'—')} · <span class="pill kind-${p.kind}" style="font-size:10px;padding:0 6px">${p.kind}</span></div>
                        <div class="kard-row">
                          <span class="value">${fmtMoney(p.budget_usd)}</span>
                          ${p.area_m2?`<span class="m2">${Number(p.area_m2).toLocaleString('es-EC')} m²</span>`:''}
                        </div>
                        <div class="kard-foot">
                          <div style="display:flex;align-items:center;gap:6px">
                            ${c?avatar(c.name,20):''}
                            <span style="font-size:11px;color:var(--text-muted)">${escapeHtml(c?(c.name.split(' ')[0]):'—')}</span>
                          </div>
                          <span class="mono" style="font-size:10px;color:${late?'var(--danger)':'#666'}">
                            ${late?'● ':''}${p.days_in_stage||0}d
                          </span>
                        </div>
                      </div>`;
                  }).join('')
                }
              </div>
            </div>`;
        }).join('')}
      </div>
    </div>`;
}

// ===== Expenses =====
function viewExpenses(){
  const f = state.expenseFilters;
  let list = state.expenses.slice();
  if (f.category !== 'all') list = list.filter(e => e.category === f.category);
  if (f.status   !== 'all') list = list.filter(e => e.status   === f.status);
  if (f.project  !== 'all') list = list.filter(e => e.project_id === f.project);
  list.sort((a,b) => new Date(b.spent_on) - new Date(a.spent_on));

  const totalAll      = state.expenses.reduce((s,e)=>s + Number(e.amount_usd||0), 0);
  const totalPaid     = state.expenses.filter(e=>e.status==='pagado').reduce((s,e)=>s + Number(e.amount_usd||0), 0);
  const totalPending  = totalAll - totalPaid;
  const totalBudget   = state.projects.reduce((s,p)=>s + Number(p.budget_usd||0), 0);
  const pctBudget     = totalBudget ? Math.round(totalAll / totalBudget * 100) : 0;

  // Top 5 proyectos más caros
  const byProject = {};
  state.expenses.forEach(e => {
    byProject[e.project_id] = (byProject[e.project_id] || 0) + Number(e.amount_usd||0);
  });
  const topProjects = Object.entries(byProject)
    .map(([pid, total]) => {
      const p = state.projects.find(x => x.id === pid);
      const budget = Number(p?.budget_usd || 0);
      const pct = budget ? Math.round(total / budget * 100) : 0;
      return { project: p, total, budget, pct };
    })
    .filter(x => x.project)
    .sort((a,b) => b.total - a.total)
    .slice(0, 5);

  // Por categoría
  const byCat = {};
  state.expenses.forEach(e => {
    byCat[e.category] = (byCat[e.category] || 0) + Number(e.amount_usd||0);
  });
  const cats = EXPENSE_CATS.map(c => ({...c, total: byCat[c.id] || 0}))
                           .sort((a,b)=>b.total-a.total);
  const catMax = Math.max(1, ...cats.map(c=>c.total));

  return `
    <div class="page">
      <div class="page-header">
        <div>
          <div class="page-eyebrow">Costes de obra</div>
          <h1 class="page-title">Gastos <span class="count">${state.expenses.length} · ${fmtMoney(totalAll)}</span></h1>
          <div class="page-sub">${pctBudget}% del presupuesto total · ${fmtMoney(totalPending)} pendiente de pago</div>
        </div>
        <div class="page-actions">
          <button class="btn primary" data-action="new-expense">+ Nuevo gasto</button>
        </div>
      </div>

      <div class="kpi-grid">
        ${kpi('Total gastado',       fmtMoney(totalAll),     null, true,  'todos los proyectos',      pseudoSeries(totalAll||1000), true)}
        ${kpi('Pagado',              fmtMoney(totalPaid),    null, true,  'efectivo + transferencia', pseudoSeries(totalPaid||500))}
        ${kpi('Pendiente de pago',   fmtMoney(totalPending), null, false, 'a proveedores',            pseudoSeries(totalPending||300))}
        ${kpi('% sobre presupuesto', pctBudget + '%',        null, true,  'gastado / presupuestado',  pseudoSeries(pctBudget||10))}
      </div>

      <div class="dash-grid">
        <div class="card flush">
          <div class="card-head">
            <div>
              <div class="card-title">Por categoría</div>
              <div class="card-sub">Distribución del gasto total</div>
            </div>
          </div>
          <div style="padding:14px 18px;display:flex;flex-direction:column;gap:10px">
            ${cats.map(c => {
              const w = (c.total / catMax) * 100;
              return `
                <div>
                  <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px">
                    <span style="color:var(--text)">${c.label}</span>
                    <span class="mono" style="color:var(--text-muted)">${fmtMoney(c.total)}</span>
                  </div>
                  <div style="height:6px;background:var(--surface-2);border-radius:3px;overflow:hidden">
                    <div style="height:100%;background:var(--gold);width:${w}%;border-radius:3px"></div>
                  </div>
                </div>`;
            }).join('')}
          </div>
        </div>

        <div class="card flush">
          <div class="card-head">
            <div>
              <div class="card-title">Top proyectos por gasto</div>
              <div class="card-sub">Mayores costes acumulados</div>
            </div>
          </div>
          <div style="padding:6px 0">
            ${topProjects.length===0?`<div style="padding:20px;color:#666;font-size:12px;text-align:center">Sin gastos registrados.</div>`:
            topProjects.map((t,i)=>`
              <div style="padding:12px 18px;border-bottom:${i<topProjects.length-1?'1px solid var(--border-soft)':'none'}">
                <div style="display:flex;justify-content:space-between;font-size:12px;gap:8px">
                  <span style="color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escapeHtml(t.project.title)}</span>
                  <span class="mono" style="color:var(--gold);white-space:nowrap">${fmtMoney(t.total)}</span>
                </div>
                <div style="display:flex;justify-content:space-between;font-size:10px;color:#666;margin-top:2px">
                  <span>Presupuesto ${fmtMoney(t.budget)}</span>
                  <span class="${t.pct>90?'':''}" style="color:${t.pct>90?'var(--danger)':t.pct>70?'var(--warn)':'var(--success)'}">${t.pct}% consumido</span>
                </div>
                <div style="margin-top:6px;height:4px;background:var(--surface-2);border-radius:2px;overflow:hidden">
                  <div style="height:100%;background:${t.pct>90?'var(--danger)':t.pct>70?'var(--warn)':'var(--gold)'};width:${Math.min(100,t.pct)}%"></div>
                </div>
              </div>`).join('')}
          </div>
        </div>

        <div class="card flush span-all">
          <div class="card-head">
            <div>
              <div class="card-title">Listado de gastos</div>
              <div class="card-sub">Filtra por categoría, estado o proyecto</div>
            </div>
            <div style="display:flex;gap:8px;flex-wrap:wrap">
              <select id="fltCategory" class="btn" style="padding:6px 10px">
                <option value="all">Todas las categorías</option>
                ${EXPENSE_CATS.map(c=>`<option value="${c.id}" ${f.category===c.id?'selected':''}>${c.label}</option>`).join('')}
              </select>
              <select id="fltStatus" class="btn" style="padding:6px 10px">
                <option value="all" ${f.status==='all'?'selected':''}>Todos los estados</option>
                <option value="pendiente" ${f.status==='pendiente'?'selected':''}>Pendiente</option>
                <option value="pagado" ${f.status==='pagado'?'selected':''}>Pagado</option>
              </select>
              <select id="fltProject" class="btn" style="padding:6px 10px">
                <option value="all">Todos los proyectos</option>
                ${state.projects.map(p=>`<option value="${p.id}" ${f.project===p.id?'selected':''}>${escapeHtml(p.title)}</option>`).join('')}
              </select>
            </div>
          </div>
          <table>
            <thead><tr>
              <th>Fecha</th><th>Descripción</th><th>Proyecto</th><th>Categoría</th><th>Proveedor</th><th class="right">Monto</th><th>Estado</th><th></th>
            </tr></thead>
            <tbody>
              ${list.length===0 ? `<tr><td colspan="8" style="padding:40px;text-align:center;color:#666">Sin gastos. <button class="btn ghost" data-action="new-expense">Registrar el primero</button></td></tr>` :
                list.map(e => {
                  const p = state.projects.find(x => x.id === e.project_id);
                  return `
                    <tr>
                      <td class="mono muted" data-label="Fecha">${fmtDate(e.spent_on)}</td>
                      <td class="strong" data-label="Descripción">${escapeHtml(e.description)}</td>
                      <td class="dim" data-label="Proyecto">${escapeHtml(p?.title || '—')}</td>
                      <td data-label="Categoría"><span class="pill">${expCatLabel(e.category)}</span></td>
                      <td class="dim" data-label="Proveedor">${escapeHtml(e.vendor || '—')}</td>
                      <td class="strong right mono" data-label="Monto">${fmtMoneyExact(e.amount_usd)}</td>
                      <td data-label="Estado"><span class="pill ${e.status==='pagado'?'ok':'warn'}">${e.status==='pagado'?'Pagado':'Pendiente'}</span></td>
                      <td class="last-col">${e.status==='pendiente'?`<button class="btn icon" data-mark-paid="${e.id}" title="Marcar pagado">✓</button>`:''}</td>
                    </tr>`;
                }).join('')
              }
            </tbody>
          </table>
        </div>
      </div>
    </div>`;
}

// ===== Property Detail =====
function viewPropertyDetail(){
  const t = state.selectedProperty;
  if (!t){ setRoute('properties'); return ''; }
  const exps = state.expenses.filter(e => e.property_id === t.id)
                .sort((x,y) => new Date(y.spent_on) - new Date(x.spent_on));
  const adminTotal = exps.reduce((s,e)=>s + Number(e.amount_usd||0), 0);
  const adminPending = exps.filter(e=>e.status==='pendiente').reduce((s,e)=>s + Number(e.amount_usd||0), 0);
  const total = Number(t.price_usd||0) + adminTotal;
  const projects = state.projects.filter(p => p.property_id === t.id);

  const statusLabel = ({disponible:'Disponible',en_negociacion:'En negociación',adquirido:'Adquirido',vendido:'Vendido'})[t.status]||t.status;
  const statusClass = t.status==='adquirido'?'gold':t.status==='en_negociacion'?'warn':t.status==='vendido'?'ok':'';

  return `
    <div class="page">
      <button class="detail-back" data-action="back-to-properties">← Terrenos</button>

      <div class="page-header" style="margin-bottom:18px">
        <div>
          <div class="page-eyebrow">${escapeHtml(t.code||'')} · <span class="pill ${statusClass}" style="font-size:10px">${statusLabel}</span></div>
          <h1 class="page-title">${escapeHtml(t.title)}</h1>
          <div class="page-sub">📍 ${escapeHtml(t.address||'—')}${t.sector?` · ${escapeHtml(t.sector)}`:''}</div>
        </div>
        <div class="page-actions">
          <button class="btn" data-action="new-expense" data-property-id="${t.id}">+ Gasto admin.</button>
          <button class="btn primary" data-action="edit-property" data-property-id="${t.id}">Editar</button>
        </div>
      </div>

      <div class="kpi-grid">
        ${kpi('Precio de compra',  fmtMoneyExact(t.price_usd), null, true,  'pago al vendedor', null, true)}
        ${kpi('Gastos admin.',     fmtMoneyExact(adminTotal),  null, false, fmtMoneyExact(adminPending) + ' pendiente', null)}
        ${kpi('Coste total',       fmtMoneyExact(total),       null, true,  'precio + gastos administrativos', null, true)}
        ${kpi('Área',              t.area_m2?(Number(t.area_m2).toLocaleString('es-EC')+' m²'):'—', null, true, t.area_m2 && t.price_usd ? '$' + (Number(t.price_usd)/Number(t.area_m2)).toFixed(0) + '/m²' : '', null)}
      </div>

      <div class="dash-grid">
        <!-- Notas + proyectos -->
        <div class="card detail-info">
          <dl>
            <dt>Código</dt>      <dd class="mono">${escapeHtml(t.code||'—')}</dd>
            <dt>Estado</dt>      <dd><span class="pill ${statusClass}">${statusLabel}</span></dd>
            <dt>Sector</dt>      <dd>${escapeHtml(t.sector||'—')}</dd>
            <dt>Dirección</dt>   <dd>${escapeHtml(t.address||'—')}</dd>
            <dt>Área</dt>        <dd>${t.area_m2?Number(t.area_m2).toLocaleString('es-EC')+' m²':'—'}</dd>
            <dt>Precio</dt>      <dd class="mono" style="color:var(--gold)">${fmtMoneyExact(t.price_usd)}</dd>

//// ----------------------- RENDER ------------------------
function render(){
  const root = $('#route');
  let html = '';
  switch(state.route){
    case 'dashboard':  html = viewDashboard();  break;
    case 'clients':    html = viewClients();    break;
    case 'pipeline':   html = viewPipeline();   break;
    case 'properties': html = viewProperties(); break;
    case 'expenses':   html = viewExpenses();   break;
    case 'detail':     html = viewDetail();     break;
    case 'project':    html = viewProjectDetail(); break;
    case 'property':   html = viewPropertyDetail(); break;
    default:           html = viewDashboard();
  }
  root.innerHTML = html;
  // Activate active nav
  $$('.nav-item, .bottom-nav button').forEach(b => b.classList.toggle('active', b.dataset.route === state.route));
  attachRouteHandlers();
}

function attachRouteHandlers(){
  // Open client detail from any row con data-client-id (excluye <a> dentro de proyecto)
  $$('tr[data-client-id]').forEach(tr => tr.addEventListener('click', e => {
    // si el click viene del enlace del cliente dentro de la columna, ya hay handler propio
    if (e.target.closest('a[data-client-id]')) return;
    const id = tr.dataset.clientId;
    if (!id) return;
    state.selectedClient = state.clients.find(c => c.id === id);
    state.routeFrom = state.route;
    setRoute('detail');
  }));
  // Click en el enlace del cliente dentro del detalle de proyecto
  $$('a[data-client-id]').forEach(a => a.addEventListener('click', e => {
    e.preventDefault(); e.stopPropagation();
    const id = a.dataset.clientId;
    state.selectedClient = state.clients.find(c => c.id === id);
    state.routeFrom = state.route;
    setRoute('detail');
  }));
  // Cambio rápido de etapa desde detalle de proyecto
  $$('[data-stage-set]').forEach(b => b.addEventListener('click', () => {
    const stageId = b.dataset.stageSet;
    const projId  = b.dataset.projectId;
    setProjectStage(projId, stageId);
  }));
  $$('.kard[data-client-id]').forEach(k => k.addEventListener('click', e => {
    if (e.target.closest('[draggable]') && k._wasDrag) { k._wasDrag=false; return; }
  }));

  // Search & filters
  const searchInput = $('#searchInput');
  if (searchInput){
    searchInput.addEventListener('input', e => { state.filters.query = e.target.value; renderClientsRows(); });
  }
  $$('[data-filter]').forEach(b => b.addEventListener('click', e => {
    state.filters.status = b.dataset.filter; render();
  }));
  $$('th[data-sort]').forEach(th => th.addEventListener('click', () => {
    const k = th.dataset.sort;
    const f = state.filters.sort;
    state.filters.sort = f.key === k ? { key:k, dir: f.dir==='asc'?'desc':'asc' } : { key:k, dir:'asc' };
    render();
  }));

  // Filtros de gastos
  const fc = $('#fltCategory'), fs = $('#fltStatus'), fp = $('#fltProject');
  if (fc) fc.addEventListener('change', () => { state.expenseFilters.category = fc.value; render(); });
  if (fs) fs.addEventListener('change', () => { state.expenseFilters.status   = fs.value; render(); });
  if (fp) fp.addEventListener('change', () => { state.expenseFilters.project  = fp.value; render(); });

  // Kanban drag&drop
  initKanban();
}

function renderClientsRows(){
  // Re-render only rows for snappier search
  const root = $('#route');
  if (state.route !== 'clients') return;
  root.innerHTML = viewClients();
  // re-focus search
  const inp = $('#searchInput'); if (inp){ inp.focus(); inp.setSelectionRange(inp.value.length, inp.value.length); }
  attachRouteHandlers();
}

//// ----------------------- KANBAN -----------------------
function initKanban(){
  const k = $('#kanban'); if (!k) return;
  let dragId = null;
  $$('.kard', k).forEach(card => {
    card.addEventListener('dragstart', e => {
      dragId = card.dataset.id;
      card._wasDrag = true;
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', dragId);
      card.classList.add('dragging');
    });
    card.addEventListener('dragend', () => { card.classList.remove('dragging'); dragId = null; $$('.col', k).forEach(c=>c.classList.remove('over')); });
    card.addEventListener('click', e => {
      const pid = card.dataset.id; if (!pid) return;
      // Abre detalle de proyecto (no del cliente) — más útil para gestión
      openProject(pid);
    });
  });
  $$('.col', k).forEach(col => {
    col.addEventListener('dragover', e => { e.preventDefault(); col.classList.add('over'); });
    col.addEventListener('dragleave', () => col.classList.remove('over'));
    col.addEventListener('drop', async e => {
      e.preventDefault();
      const id = e.dataTransfer.getData('text/plain') || dragId;
      const newStage = col.dataset.stage;
      col.classList.remove('over');
      if (!id || !newStage) return;
      const proj = state.projects.find(p => p.id === id);
      if (!proj || proj.stage === newStage) return;
      const old = proj.stage; proj.stage = newStage; proj.days_in_stage = 0;
      render();
      if (DEMO_MODE){ toast('Movido a ' + stageLabel(newStage) + ' (demo)'); return; }
      const { error } = await sb.from('projects').update({ stage: newStage, days_in_stage: 0 }).eq('id', id);
      if (error){ proj.stage = old; render(); toast('Error: ' + error.message, true); }
      else toast('Movido a ' + stageLabel(newStage));
    });
  });
}

async function saveExpense(){
  const f = $('#newExpenseForm');
  const data = Object.fromEntries(new FormData(f));
  if (!data.project_id && !data.property_id) { toast('Asocia el gasto a un proyecto o terreno', true); return; }
  if (!data.description) { toast('Falta la descripción', true); return; }
  if (!data.amount_usd || Number(data.amount_usd) <= 0) { toast('Monto inválido', true); return; }
  data.amount_usd = Number(data.amount_usd);
  if (!data.status) data.status = 'pendiente';
  if (data.status === 'pagado' && !data.paid_on) data.paid_on = data.spent_on;
  // limpia los vacíos para no mandar strings al UUID
  if (!data.project_id)  delete data.project_id;
  if (!data.property_id) delete data.property_id;

  if (DEMO_MODE){
    const row = { id: 'demo-exp-' + Date.now(), created_at: new Date().toISOString(), ...data };
    state.expenses.unshift(row);
    closeExpenseModal();
    toast('Gasto registrado en demo · ' + fmtMoneyExact(row.amount_usd));
    render();
    return;
  }

  const { data:row, error } = await sb.from('expenses').insert(data).select('*').single();
  if (error) {
    if (/relation .* expenses .* does not exist/i.test(error.message)) {
      toast('La tabla expenses no existe — ejecuta el SQL nuevo', true);
    } else {
      toast('Error guardando: ' + error.message, true);
    }
    return;
  }
  state.expenses.unshift(row);
  closeExpenseModal();
  toast('Gasto registrado · ' + fmtMoneyExact(row.amount_usd));
  render();
}

async function saveProperty(){
  const f = $('#newPropertyForm');
  const data = Object.fromEntries(new FormData(f));
  const isEdit = !!data.id;
  const editId = data.id;
  delete data.id;
  if (!data.title) { toast('Falta el título', true); return; }
  if (!data.status) data.status = 'disponible';
  if (data.area_m2 === '')   delete data.area_m2;   else data.area_m2   = Number(data.area_m2);
  if (data.price_usd === '') delete data.price_usd; else data.price_usd = Number(data.price_usd);
  ['code','address','sector','notes'].forEach(k => { if (data[k] === '') delete data[k]; });

  // autogenerar código si no se especifica (solo en alta)
  if (!isEdit && !data.code){
    const next = state.properties.length + 1;
    data.code = 'T-' + String(next).padStart(3,'0');
  }

  if (isEdit){
    if (DEMO_MODE){
      const idx = state.properties.findIndex(x => x.id === editId);
      if (idx >= 0) state.properties[idx] = { ...state.properties[idx], ...data };
      closePropertyModal(); toast('Terreno actualizado (demo)'); render(); return;
    }
    const { data:row, error } = await sb.from('properties').update(data).eq('id', editId).select('*').single();
    if (error){ toast('Error: '+error.message, true); return; }
    const idx = state.properties.findIndex(x => x.id === editId);
    if (idx >= 0) state.properties[idx] = row;
    closePropertyModal(); toast('Terreno actualizado'); render(); return;
  }

  if (DEMO_MODE){
    const row = { id: 'demo-t-' + Date.now(), created_at: new Date().toISOString(), ...data };
    state.properties.push(row);
    closePropertyModal(); toast('Terreno creado (demo) · ' + row.code); render(); return;
  }
  const { data:row, error } = await sb.from('properties').insert(data).select('*').single();
  if (error){
    if (/duplicate.*code/i.test(error.message))
      toast('El código ' + data.code + ' ya existe', true);
    else
      toast('Error: '+error.message, true);
    return;
  }
  state.properties.push(row);
  closePropertyModal(); toast('Terreno creado · ' + row.code); render();
}

  }
  const projSel = f.querySelector('select[name="project_id"]');

    ? state.projects.filter(p => p.client_id === clientId || p.id === prefill.project_id)
    : state.projects;

    projects.map(p => `<option value="${p.id}" ${prefill.project_id===p.id?'selected':''}>${escapeHtml(p.code||'')} · ${escapeHtml(p.title)}</option>`).join('');
  f.querySelector('input[name="client_id"]').value = clientId || '';
  // Si no hay cliente (proyecto propio), permitir actividad sin cliente — pero saveActivity exige client_id.
  // Solución: si no hay cliente, usamos el id del proyecto como fallback no es válido; mejor dejamos hacer al usuario.
  // Para proyectos propios sin cliente, registrar la actividad NO requiere cliente (lo desactivamos en validación).
  // hora actual
  const now = new Date(Date.now() - new Date().getTimezoneOffset()*60000)
                .toISOString().slice(0,16);

async function saveActivity(){
  const f = $('#newActivityForm');
  const data = Object.fromEntries(new FormData(f));
  if (!data.title)      { toast('Falta el título', true); return; }
  if (!data.occurred_at){ toast('Falta la fecha', true); return; }
  if (!data.project_id) data.project_id = null;
  if (!data.client_id)  data.client_id  = null;
  // Si no hay ni cliente ni proyecto, no aporta nada — pedimos al menos uno.
  if (!data.client_id && !data.project_id){ toast('Asocia la actividad a un cliente o un proyecto', true); return; }
  // datetime-local devuelve "YYYY-MM-DDTHH:mm" (sin timezone) — lo convertimos a ISO
  data.occurred_at = new Date(data.occurred_at).toISOString();

  if (DEMO_MODE){
    const row = { id: 'demo-act-' + Date.now(), created_at: new Date().toISOString(), ...data };
    state.activities.unshift(row);
    closeActivityModal();
    toast('Actividad registrada (demo)');
    render();
    return;
  }

  const { data:row, error } = await sb.from('activities').insert(data).select('*').single();
  if (error) { toast('Error guardando: ' + error.message, true); return; }
  state.activities.unshift(row);
  // refresca last_activity del cliente (si hay)
  if (row.client_id){
    await sb.from('clients').update({ last_activity: row.occurred_at }).eq('id', row.client_id);
    const c = state.clients.find(x => x.id === row.client_id);
    if (c) c.last_activity = row.occurred_at;
  }
  closeActivityModal();
  toast('Actividad registrada');
  render();
}

async function setProjectStage(projectId, newStage){
  const proj = state.projects.find(p => p.id === projectId);
  if (!proj || proj.stage === newStage) return;
  const old = proj.stage;
  proj.stage = newStage; proj.days_in_stage = 0;
  if (state.selectedProject?.id === projectId) state.selectedProject = proj;
  render();
  if (DEMO_MODE){ toast('Etapa: ' + stageLabel(newStage) + ' (demo)'); return; }
  const { error } = await sb.from('projects').update({ stage: newStage, days_in_stage: 0 }).eq('id', projectId);
  if (error){ proj.stage = old; render(); toast('Error: '+error.message, true); }
  else toast('Etapa actualizada: ' + stageLabel(newStage));
}

document.addEventListener('click', e => {
  const markPaid = e.target.closest('[data-mark-paid]');
  if (markPaid){ markExpensePaid(markPaid.dataset.markPaid); return; }

  const a = e.target.closest('[data-action]');
  if (a){
    const act = a.dataset.action;
    if (act === 'new-project'){ openModal({ client_id: a.dataset.clientId }); }
    if (act === 'close-modal') closeModal();
    if (act === 'save-project') saveProject();
    if (act === 'new-expense'){
      openExpenseModal({ project_id: a.dataset.projectId });
    }
    if (act === 'close-expense') closeExpenseModal();
    if (act === 'save-expense') saveExpense();
    if (act === 'new-activity'){
      openActivityModal({ client_id: a.dataset.clientId, project_id: a.dataset.projectId });
    }
    if (act === 'close-activity') closeActivityModal();
    if (act === 'save-activity') saveActivity();
    if (act === 'edit-project'){
      const pid = a.dataset.projectId;
      const proj = state.projects.find(p => p.id === pid);
      if (proj) openModal(proj);
    }
    if (act === 'new-client'){ openClientModal(); }
    if (act === 'edit-client'){
      const cid = a.dataset.clientId;
      const c = state.clients.find(x => x.id === cid);
      if (c) openClientModal(c);
    }
    if (act === 'close-client') closeClientModal();
    if (act === 'save-client') saveClient();
    if (act === 'new-property'){ openPropertyModal(); }
    if (act === 'edit-property'){
      const pid = a.dataset.propertyId;
      const p = state.properties.find(x => x.id === pid);
      if (p) openPropertyModal(p);
    }
    if (act === 'close-property') closePropertyModal();
    if (act === 'save-property') saveProperty();
    if (act === 'back') setRoute(state.routeFrom || 'clients');
    if (act === 'back-to-from') setRoute(state.routeFrom || 'pipeline');
    if (act === 'back-to-properties') setRoute('properties');
    if (act === 'reload') reloadAll();
  }
  // click en una fila con data-project-id abre el detalle del proyecto
  const projRow = e.target.closest('[data-project-id-row]');
  if (projRow && !a){
    openProject(projRow.dataset.projectIdRow);
    return;
  }
  // click en una fila con data-property-id-row abre el detalle del terreno
  const propRow = e.target.closest('[data-property-id-row]');
  if (propRow && !a){
    openPropertyDetail(propRow.dataset.propertyIdRow);
    return;
  }
  const r = e.target.closest('[data-route]');
  if (r && !a){
    if (r.dataset.route === 'new'){ openModal(); return; }
    setRoute(r.dataset.route);
  }
});

$('#modalActivity').addEventListener('click', e => { if (e.target.id === 'modalActivity') closeActivityModal(); });

          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M6 6l12 12M6 18L18 6"/></svg>
        </button>
      </div>
      <div class="modal-body" style="font-size:13px;line-height:1.6;color:var(--text-muted)">
        <ol style="padding-left:20px;display:flex;flex-direction:column;gap:10px">
          <li>Entra en <a href="https://supabase.com/dashboard" target="_blank" style="color:var(--gold)">supabase.com/dashboard</a> y pulsa <strong style="color:var(--text)">New project</strong> (es gratis).</li>
          <li>Nómbralo p.ej. <code style="background:var(--surface-2);padding:1px 6px;border-radius:4px;color:var(--gold)">crm-loja</code>, elige una contraseña fuerte para la BD y región <strong style="color:var(--text)">South America (São Paulo)</strong>.</li>
          <li>Cuando termine de aprovisionar (~2 min), abre <strong style="color:var(--text)">SQL Editor → New query</strong>, pega todo el contenido de <code style="background:var(--surface-2);padding:1px 6px;border-radius:4px">supabase_schema.sql</code> y pulsa <strong style="color:var(--text)">Run</strong>.</li>
          <li>Ve a <strong style="color:var(--text)">Project Settings → API</strong> y copia <em>Project URL</em> + <em>anon public key</em>.</li>
          <li>Edita <code style="background:var(--surface-2);padding:1px 6px;border-radius:4px">index.html</code>, sustituye <code style="background:var(--surface-2);padding:1px 6px;border-radius:4px">SUPABASE_URL</code> y <code style="background:var(--surface-2);padding:1px 6px;border-radius:4px">SUPABASE_KEY</code>, recarga la página y listo.</li>
        </ol>
        <div style="margin-top:18px;padding:12px;border:1px solid var(--border);border-radius:8px;background:var(--surface-2);font-size:12px">
          <strong style="color:var(--text)">¿Por qué pasa esto?</strong> La URL que tienes ahora (<code style="color:var(--danger)">pjhyqpinpebddwohuhqq.supabase.co</code>) no resuelve en DNS — el proyecto no existe todavía o la URL tiene un typo. Mientras lo creas, la app funciona en modo demo con datos en memoria.

      </div>
      <div class="modal-foot">
        <button class="btn primary" onclick="this.closest('.modal-backdrop').remove()">Entendido</button>
      </div>
    </div>`;
  m.addEventListener('click', e => { if (e.target === m) m.remove(); });
  document.body.appendChild(m);
}

(async function bootstrap(){
  // 1) intento real con Supabase
  try {
    await loadAll();
  } catch(err){
    // 2) caída a modo demo si Supabase no responde
    console.warn('Supabase no disponible, activando modo demo:', err);
    DEMO_MODE = true;
    await loadAll();
  }
  $('#loader').remove();
  $('#app').style.display = 'flex';
  setRoute('dashboard');
  if (DEMO_MODE) showDemoBanner('Supabase no respondió o el proyecto no existe.');
})();
</script>
